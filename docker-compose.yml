version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: marcaflow_db
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma_password
      POSTGRES_DB: marcaflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marcaflow-network

  redis:
    image: redis:7-alpine
    container_name: marcaflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marcaflow-network

volumes:
  postgres_data:
  redis_data:

networks:
  marcaflow-network:
    driver: bridge
